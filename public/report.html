<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="refresh" content="0;url=/?page=presentation" />
<title>员工工作台三端协同 - 设计方案</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #6b7280;
    font-size: 14px;
  }
  .loading { text-align: center; }
  .loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e5e7eb;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>正在加载设计方案…</p>
  </div>
  <script>
    // fallback: 如果用 meta refresh 没跳转，用 JS 再试一次
    var baseUrl = window.location.origin;
    window.location.replace(baseUrl + '/?page=presentation');
  </script>
</body>
</html>
